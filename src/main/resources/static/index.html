<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MES Platform API</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 2rem;
            color: #1f2937;
            background: #f8fafc;
        }
        h1 { margin-bottom: 0.5rem; }
        code {
            background: #e2e8f0;
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
        }
        li { margin: 0.35rem 0; }
    </style>
</head>
<body>
<h1>MES 后端服务</h1>
<p>服务已启动，可通过以下接口验证：</p>
<ul>
    <li><code>POST /api/auth/login</code> 登录获取 JWT</li>
    <li><code>GET /api/devices</code> 设备列表（需携带 Token）</li>
    <li><code>GET /api/work-orders</code> 工单列表（需携带 Token）</li>
    <li><code>GET /api/reports/work-orders</code> 报表接口（管理员）</li>
    <li><code>POST /api/ai/diagnosis</code> AI 诊断接口</li>
</ul>
</body>
</html>
